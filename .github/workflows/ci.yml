name: CI

# Trust is the product for a privacy package: every change is typechecked, unit-tested,
# and loaded through Pi's REAL resource loader before it can merge. The two live smokes
# (attestation against real enclaves, OpenRouter ZDR enforcement) need network + secrets,
# so they are intentionally NOT gated here — run them locally with `npm run smoke:*`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor pinned by .nvmrc / engines (22.19.0), plus current to catch drift.
        node: ["22.19.0", "24.x"]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Offline integration smokes: prove the extension + published package entry wire
      # into a real Pi session and register providers with zero error diagnostics.
      - name: Smoke — extension load
        run: npm run smoke:extension

      - name: Smoke — package entry
        run: npm run smoke:package
