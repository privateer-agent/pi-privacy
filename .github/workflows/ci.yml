name: CI

# Trust is the product for a privacy package: every change is typechecked and unit-tested
# (the 97-case suite is self-contained — no network, no optional Pi runtime) before it can
# merge. The smokes load the extension through Pi's REAL resource loader, so they need the
# OPTIONAL `@earendil-works/pi-coding-agent` peer installed; they are run locally with
# `npm run smoke:*` (the live attestation/ZDR ones also need network + secrets).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor pinned by .nvmrc / engines (22.19.0), plus current to catch drift.
        node: ["22.19.0", "24.x"]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
